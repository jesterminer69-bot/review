function esc(x){return String(x??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function fmt(x){if(typeof x==='number')return Math.round(x*10000)/10000; return esc(x);}
function pill(t){let cls='pill'; if(String(t).includes('dead')||String(t).includes('negative')||String(t).includes('stop_loss'))cls+=' bad'; else if(String(t).includes('over')||String(t).includes('fee')||String(t).includes('weak'))cls+=' warn'; return `<span class="${cls}">${esc(t)}</span>`}
let champions=REPORT.champions||[]; let selected=null;
function render(){const app=document.getElementById('app'); const regimes=[...new Set(champions.map(c=>c.regime||'UNKNOWN'))].sort(); const tags=[...new Set(champions.flatMap(c=>c.failure_tags||[]))].sort(); app.innerHTML=`<div class="top"><div class="card"><b>Generated</b><br>${esc(REPORT.generated_at)}<br><span class="pill">v${esc(REPORT.version)}</span></div><div class="card"><b>Analyzed</b><br>${champions.length} champions<br><span class="pill">${esc(REPORT.summary?.trade_count_loaded||0)} trades loaded</span></div><div class="card"><b>Highest priority</b><br>${esc(REPORT.summary?.highest_priority_champion||'none')}<br><span class="pill">score ${esc(REPORT.summary?.highest_priority_score||0)}</span></div></div><div class="card"><b>Filters</b><br><input id="q" placeholder="search champion, regime, tag" oninput="drawTable()"><select id="regime" onchange="drawTable()"><option value="">All regimes</option>${regimes.map(r=>`<option>${esc(r)}</option>`).join('')}</select><select id="tag" onchange="drawTable()"><option value="">All tags</option>${tags.map(t=>`<option>${esc(t)}</option>`).join('')}</select><button onclick="sortMode='priority';drawTable()">Sort priority</button><button onclick="sortMode='pnl';drawTable()">Sort P/L</button><button onclick="sortMode='trades';drawTable()">Sort trades</button></div><div class="grid"><div class="card"><h2>Rebuild Queue</h2><div id="tbl"></div></div><div class="card"><h2>Selected Champion</h2><div id="detail">Click a champion row.</div></div></div>`; drawTable();}
let sortMode='priority';
function filtered(){let q=(document.getElementById('q')?.value||'').toLowerCase(); let r=document.getElementById('regime')?.value||''; let tag=document.getElementById('tag')?.value||''; let rows=champions.filter(c=>{let blob=JSON.stringify(c).toLowerCase(); return (!q||blob.includes(q))&&(!r||c.regime===r)&&(!tag||(c.failure_tags||[]).includes(tag));}); rows.sort((a,b)=>{if(sortMode==='pnl')return (a.round_trip_stats?.pnl_est||0)-(b.round_trip_stats?.pnl_est||0); if(sortMode==='trades')return (b.trade_count||0)-(a.trade_count||0); return (b.priority_score||0)-(a.priority_score||0);}); return rows;}
function drawTable(){let rows=filtered(); document.getElementById('tbl').innerHTML=`<table><thead><tr><th>Priority</th><th>Champion</th><th>Regime</th><th>Health</th><th>Trades</th><th>Round Trips</th><th>Est P/L</th><th>Tags</th></tr></thead><tbody>${rows.map((c,i)=>`<tr onclick="showDetail('${esc(c.champion_id).replace(/'/g,"\'")}')"><td>${fmt(c.priority_score)}</td><td>${esc(c.champion_id)}<br><small>${esc(c.public_champion_id||'')}</small></td><td>${esc(c.regime)}</td><td>${esc(c.health)}</td><td>${esc(c.trade_count)}</td><td>${esc(c.round_trip_stats?.completed_round_trips||0)}</td><td>${fmt(c.round_trip_stats?.pnl_est||0)}</td><td>${(c.failure_tags||[]).map(pill).join('')}</td></tr>`).join('')}</tbody></table>`;}
function showDetail(cid){let c=champions.find(x=>x.champion_id===cid); if(!c)return; selected=c; let stats=c.round_trip_stats||{}; document.getElementById('detail').innerHTML=`<h3>${esc(c.champion_id)}</h3><p>${pill(c.regime)} ${pill(c.health)} <span class="pill">priority ${fmt(c.priority_score)}</span></p><p><b>Recommendation:</b> ${esc(c.recommendation||'')}</p><p><b>Stats:</b> trades=${esc(c.trade_count)} buys=${esc(c.buy_count)} sells=${esc(c.sell_count)} roundTrips=${esc(stats.completed_round_trips||0)} wins=${esc(stats.wins||0)} losses=${esc(stats.losses||0)} winRate=${fmt(stats.win_rate||0)} pnl=${fmt(stats.pnl_est||0)} maxBuyCluster=${esc(stats.max_buy_cluster||0)}</p><h4>Failure tags</h4><p>${(c.failure_tags||[]).map(pill).join('')}</p><h4>Manual rebuild direction</h4><ul>${(c.manual_rebuild_recommendations||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h4>Most common reasons</h4><pre>${esc(JSON.stringify(c.reason_counts||{},null,2))}</pre><h4>Worst round trips</h4>${rtTable(stats.worst_round_trips||[])}<h4>Best round trips</h4>${rtTable(stats.best_round_trips||[])}<h4>Rebuild plan</h4><pre>${esc(c.rebuild_plan||'')}</pre>`;}
function rtTable(rows){if(!rows.length)return '<p>None.</p>'; return `<table><thead><tr><th>Entry</th><th>Exit</th><th>Regime</th><th>Buys</th><th>Exit reason</th><th>P/L est</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.entry_time)}</td><td>${esc(r.exit_time)}</td><td>${esc(r.regime)}</td><td>${esc(r.buy_count)}</td><td>${esc(r.exit_reason)}</td><td>${fmt(r.pnl_est)}</td></tr>`).join('')}</tbody></table>`}
render();</script></body></html>
